<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ears -->
  <circle cx="20" cy="25" r="15" fill="#000"/>
  <circle cx="80" cy="25" r="15" fill="#000"/>
  <!-- Face -->
  <circle cx="50" cy="50" r="45" fill="#fff" stroke="#000" stroke-width="4"/>
  <!-- Eye patches -->
  <ellipse cx="32" cy="45" rx="12" ry="18" fill="#000" transform="rotate(-30 32 45)"/>
  <ellipse cx="68" cy="45" rx="12" ry="18" fill="#000" transform="rotate(30 68 45)"/>
  <!-- Eyes -->
  <circle cx="32" cy="45" r="4" fill="#fff"/>
  <circle cx="68" cy="45" r="4" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="50" cy="65" rx="8" ry="5" fill="#000"/>
  <!-- Mouth -->
  <path d="M 50 70 Q 50 80 40 80 M 50 70 Q 50 80 60 80" stroke="#000" stroke-width="3" fill="none"/>
</svg>
